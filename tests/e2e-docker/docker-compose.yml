services:
  e2e-agent:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    environment:
      - E2E_SCENARIO=${E2E_SCENARIO:-preflight}
      - E2E_USER_ID
      - E2E_USER_IDS
      - E2E_INSTALLER_URL
      - E2E_PROFILE=${E2E_PROFILE:-linux-8u}
      - E2E_SLS_PROJECT
      - E2E_SLS_LOGSTORE
      - E2E_SLS_ENDPOINT
      - E2E_SLS_ACCESS_KEY_ID
      - E2E_SLS_ACCESS_KEY_SECRET
      - E2E_CODEX_OPENAI_API_KEY
      - E2E_ANTHROPIC_API_KEY
      - E2E_CLAUDE_BAILIAN
      - E2E_CLAUDE_BAILIAN_API_KEY
      - E2E_QODER_PERSONAL_ACCESS_TOKEN
      - E2E_WRITE_REMOTE_CODEX_CONFIG
      - E2E_WRITE_REMOTE_CODEX_CONFIG_REPLACE
      - E2E_WRITE_REMOTE_CLAUDE_ONBOARDING_SKIP
      - E2E_WRITE_REMOTE_CLAUDE_PROXY_CONFIG
      - E2E_CLAUDE_PROXY_API_KEY
      - E2E_USE_MATRIX_PROBE
      - E2E_ENSURE_AGENT_CLIS
      - E2E_AGENT_PROBE_CMD
      - E2E_AGENT_VERSIONS_N
      - E2E_AGENT_VERSIONS_FILTER
      - E2E_VERSION_MATRIX_REQUIRE_PILOT
      - E2E_VERSION_MATRIX_RESTORE_LATEST
      - E2E_VERSION_MATRIX_AUTO_UPGRADE_NODE
      - E2E_VERSION_MATRIX_AUTO_PATCHELF
      - E2E_CURSOR_API_KEY
      - E2E_CURSOR_INSTALL_STRATEGY
      - E2E_CURSOR_SKIP_IF_INCOMPAT
      - E2E_PROBE_SKIP_AGENTS=${E2E_PROBE_SKIP_AGENTS:-cursor}
      - E2E_CODEX_FORCE_ENSURE
      - E2E_JSONL_VALIDATE
      - E2E_JSONL_STRICT
      - E2E_REQUIRED_JSONL_AGENTS
      - E2E_PROPAGATE_SLS_INSTALL
      - E2E_DOCKER_MODE=1
      - E2E_DOCKER_KEEP_ALIVE
      - E2E_DOCKER_EXIT_ON_FAILURE
      - E2E_LOCAL_BUILD=${E2E_LOCAL_BUILD:-0}
      - LOONGSUITE_PILOT_DISCOVERY_INTERVAL_MS=${LOONGSUITE_PILOT_DISCOVERY_INTERVAL_MS:-30000}
      - LOONGSUITE_PILOT_HOOK_WATCHDOG_INTERVAL_MS=${LOONGSUITE_PILOT_HOOK_WATCHDOG_INTERVAL_MS:-30000}
      - E2E_LOG_DIR=/opt/artifacts
    volumes:
      - ../../:/opt/project:ro
      - ../../scripts/e2e:/opt/e2e:ro
      - ./output:/opt/artifacts
    tmpfs:
      - /run
      - /run/lock
    stop_grace_period: 30s
